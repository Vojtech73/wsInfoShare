services:
  web:
    image: ghcr.io/vojtech73/ws-info-share:latest
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env.production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ws_info_share}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
